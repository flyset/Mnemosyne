[project]
name = "mnemosyne"
version = "0.1.0"
description = "Local-first MCP server for AI agent memory, awareness, reflection, and user-governed context."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
  { name = "Kosta Gerodimos" }
]
dependencies = [
  "fastapi",
  "uvicorn[standard]",
]

[project.scripts]
mnemosyne = "mnemosyne:main"
mnemosyne-dev = "mnemosyne:dev"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
